@for (window of windows(); track window) {
  <mg-window
    [isOpen]="true"
    [component]="window"
    [resizerHost]="this"
    [focus]="window.focus"
    (mousedown)="select(window)"
    (onClose)="remove(window)"
    (onMinimize)="onWindowMinimize(window)"
    (onRestore)="onWindowRestore(window)"
    (onFocus)="onWindowFocus(window)"
  />
}
