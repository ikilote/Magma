<div class="top label">
  @if (forId()) {
    <label [for]="forId()"><ng-container [ngTemplateOutlet]="label" /></label>
  } @else {
    <ng-container [ngTemplateOutlet]="label" />
  }
</div>
<div class="content {{ alignMode() === 'column' ? 'column' : 'row' }}">
  <ng-content select="mg-input-before" />
  <ng-content select="mg-input-prefix" />
  <ng-content
    select="
      mg-input-checkbox,
      mg-input-color,
      mg-input-date,
      mg-input-number,
      mg-input-password,
      mg-input-radio,
      mg-input-range,
      mg-input-select,
      mg-input-text,
      mg-input-textarea
    "
  />
  <ng-content select="mg-input-suffix" />
  <ng-content select="mg-input-after" />
</div>
<div class="bottom">
  @if (_errorMessage()) {
    <div class="error" [innerHTML]="_errorMessage()"></div>
  }
  <ng-content select="mg-input-error" />
  <ng-content select="mg-input-desc" />
</div>

<ng-template #label>
  <ng-content select="mg-input-label" />
</ng-template>
