<div class="preview-area">
  <div class="preview-box" [style.transform]="cssValue()">{{ labels().preview }}</div>
</div>

<div class="output">
  <code>{{ cssValue() }}</code>
  <button (click)="copyValue()">{{ labels().copy }}</button>
  <button (click)="resetAll()">{{ labels().reset }}</button>
</div>

<div class="fields">
  <mg-input>
    <mg-input-label>{{ labels().translateX }}</mg-input-label>
    <mg-input-range min="-200" max="200" [ngModel]="translateX()" (ngModelChange)="update('translateX', $event)" />
    <mg-input-after>
      <select [ngModel]="translateUnit()" (ngModelChange)="translateUnit.set($event)">
        @for (u of lengthUnits; track u) {
          <option [value]="u">{{ u }}</option>
        }
      </select>
    </mg-input-after>
  </mg-input>

  <mg-input>
    <mg-input-label>{{ labels().translateY }}</mg-input-label>
    <mg-input-range min="-200" max="200" [ngModel]="translateY()" (ngModelChange)="update('translateY', $event)" />
  </mg-input>

  <mg-input>
    <mg-input-label>{{ labels().scaleX }}</mg-input-label>
    <mg-input-range
      min="0"
      max="30"
      step="1"
      [ngModel]="scaleX() * 10"
      (ngModelChange)="update('scaleX', $event / 10)"
    />
  </mg-input>

  <mg-input>
    <mg-input-label>{{ labels().scaleY }}</mg-input-label>
    <mg-input-range
      min="0"
      max="30"
      step="1"
      [ngModel]="scaleY() * 10"
      (ngModelChange)="update('scaleY', $event / 10)"
    />
  </mg-input>

  <mg-input>
    <mg-input-label>{{ labels().rotation }}</mg-input-label>
    <mg-input-range min="-180" max="180" [ngModel]="rotate()" (ngModelChange)="update('rotate', $event)" />
    <mg-input-after>deg</mg-input-after>
  </mg-input>

  <mg-input>
    <mg-input-label>{{ labels().skewX }}</mg-input-label>
    <mg-input-range min="-90" max="90" [ngModel]="skewX()" (ngModelChange)="update('skewX', $event)" />
    <mg-input-after>deg</mg-input-after>
  </mg-input>

  <mg-input>
    <mg-input-label>{{ labels().skewY }}</mg-input-label>
    <mg-input-range min="-90" max="90" [ngModel]="skewY()" (ngModelChange)="update('skewY', $event)" />
    <mg-input-after>deg</mg-input-after>
  </mg-input>
</div>
