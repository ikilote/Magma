@if (isOpen()) {
  <div
    class="content"
    role="dialog"
    [attr.aria-label]="label()"
    [attr.aria-labelledby]="computedId() + '-title'"
    (click)="_propagationStop($event)"
    limitFocus
    #div
  >
    @if (closeButton()) {
      <button type="button" class="close" (click)="close()" (window:keydown.esc)="close()" [title]="closeButtonTitle()">
        ×
      </button>
    }
    <div class="main">
      @let h1 = title();
      @if (h1) {
        <h1 [id]="computedId() + '-title'">{{ h1 }}</h1>
      }
      <ng-content />
    </div>
  </div>
}
